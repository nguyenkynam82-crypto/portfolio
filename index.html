    <!-- Content-Security-Policy (delivered via <meta> — GitHub Pages cannot set HTTP headers).
         script-src is STRICT: 'self' + a sha256 hash for the tiny non-blocking font loader,
         NO 'unsafe-inline' (closes the main XSS vector). style-src keeps 'unsafe-inline'
         because Tailwind/React/Framer emit inline styles — not a script-execution vector.
         HSTS / COOP / X-Frame-Options / X-Content-Type-Options / Permissions-Policy need real
         HTTP response headers -> NOT settable on static GitHub Pages (need a proxy e.g. Cloudflare). -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-3j0Qvw3SOh6wKbLsxxjBgz1bMET3yr4iV5dtuThJ1Cw='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' blob:; connect-src 'self' https://mixerno.space https://discord.com; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-src 'none'; upgrade-insecure-requests" />
